<!DOCTYPE html>
<html>
  <head>
    <title>文件列表</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <h1>当前目录下的文件列表：</h1>
    <ul id="file-list"></ul>
    <script>
      var fileList = $("#file-list");
      $.ajax({
        url: ".",
        success: function (data) {
          $(data)
            .find("a")
            .attr("href", function (i, val) {
              if (val.match(/\.(txt|md|html|css|js|json|xml|csv|log|rtf|tex|odt|jpg|jpeg|png|gif|bmp|svg|ico|mp3|wav|ogg|aac|flac|mp4|avi|mov|wmv|flv|mkv|zip|rar|tar|gz|7z|doc|docx|xls|xlsx|ppt|pptx|pdf|sql|db|mdb|accdb|exe|dll|bat|sh|jar)$/)) {
                var li = $("<li></li>");

                var link = $("<a></a>").attr("href", val).text(val);
                li.append(link);
                fileList.append(li);
              }
            });
        },
      });
    </script>
  </body>
</html>

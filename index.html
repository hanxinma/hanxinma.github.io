<!DOCTYPE html>
<html>
  <head>
    <title>文件列表</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <h1>当前目录下的文件列表：</h1>
    <ul id="file-list"></ul>
    <script>
      var fileList = $("#file-list");
      var owner = "hanxinma";
      var repo = "hanxinma/hanxinma.github.io";
      var path = "";

      $.ajax({
        url: "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path,
        success: function(data) {
          data.forEach(function(file) {
            if (file.type === "file") {
              var link = $("<a>")
                .attr("href", file.html_url)
                .text(file.name);
              var item = $("<li>").append(link);
              fileList.append(item);
            }
          });
        }
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>文件列表</title>
  </head>
  <body>
    <h1>当前目录下的文件列表：</h1>
    <ul id="file-list"></ul>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(document).ready(function() {
        $.ajax({
          url: "https://api.github.com/repos/hanxinma/file-listing/contents/",
          success: function(data) {
            for (var i = 0; i < data.length; i++) {
              if (data[i].type === "file") {
                $("#file-list").append("<li>" + data[i].name + "</li>");
              }
            }
          }
        });
      });
    </script>
  </body>
</html>

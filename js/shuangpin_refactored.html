    <script>
        // 双拼转换工具 - 重构版
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const pinyinTable = document.getElementById('pinyinTable');
            const sourceScheme = document.getElementById('sourceScheme');
            const targetScheme = document.getElementById('targetScheme');
            const customMapping = document.getElementById('customMapping');
            const extractSchemeBtn = document.getElementById('extractSchemeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');
            const addSpaceBtn = document.getElementById('addSpaceBtn');
            const convertBtn = document.getElementById('convertBtn');
            const convertTwoLettersBtn = document.getElementById('convertTwoLettersBtn');
            const convertByPairsBtn = document.getElementById('convertByPairsBtn');
            const countChineseBtn = document.getElementById('countChineseBtn');
            const advancedBtn = document.getElementById('advancedBtn');
            const removeSpacesBtn = document.getElementById('removeSpacesBtn');
            const exportBtn = document.getElementById('exportBtn');
            const copyBtn = document.getElementById('copyBtn');

            // 双拼方案名称映射
            const schemeNames = {
                1: '全拼',
                2: '小鹤',
                3: '自然',
                4: '蓝天',
                5: '小牛',
                6: '大牛',
                7: '自定义',
                8: '国标',
                9: '紫光',
                10: '搜狗',
                11: '加加',
                12: '微软',
                13: '智能abc'
            };

            // 当前映射表
            let currentMapping = {};

            // 提取双拼对照表
            function extractSchemeMapping() {
                const source = parseInt(sourceScheme.value);
                const target = parseInt(targetScheme.value);

                if (source < 1 || source > 13 || target < 1 || target > 13) {
                    alert('请输入有效的双拼方案编号(1-13)');
                    return;
                }

                if (source === target) {
                    alert('源双拼方案和目标双拼方案不能相同');
                    return;
                }

                // 解析双拼对照表
                const lines = pinyinTable.value.trim().split('\n');
                const mapping = {};

                // 跳过第一行（标题行）
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t');
                    if (parts.length >= Math.max(source, target) + 1) {
                        const sourcePinyin = parts[source].trim();
                        const targetPinyin = parts[target].trim();

                        if (sourcePinyin && targetPinyin && sourcePinyin !== 'x') {
                            mapping[sourcePinyin] = targetPinyin;
                        }
                    }
                }

                // 生成映射文本
                let mappingText = `# ${schemeNames[source]} 转 ${schemeNames[target]} 双拼对照表\n`;
                for (const [source, target] of Object.entries(mapping)) {
                    mappingText += `${source}\t${target}\n`;
                }

                customMapping.value = mappingText;
                currentMapping = mapping;

                // 显示成功提示
                alert(`成功提取 ${schemeNames[source]} 转 ${schemeNames[target]} 双拼对照表`);
            }

            // 解析自定义映射
            function parseCustomMapping() {
                const mapping = {};
                const lines = customMapping.value.trim().split('\n');

                for (const line of lines) {
                    // 跳过注释行
                    if (line.startsWith('#')) continue;

                    const parts = line.split('\t');
                    if (parts.length >= 2) {
                        const source = parts[0].trim();
                        const target = parts[1].trim();

                        if (source && target) {
                            mapping[source] = target;
                        }
                    }
                }

                return mapping;
            }

            // 第2个字母后加空格
            function addSpaceAfterSecondChar() {
                const text = inputText.value;
                const result = text.replace(/(\b\w\w)/g, '$1 ');
                outputText.value = result;
            }

            // 按空格转换
            function convertBySpace() {
                const mapping = parseCustomMapping();
                if (Object.keys(mapping).length === 0) {
                    alert('请先提取或设置双拼映射表');
                    return;
                }

                const text = inputText.value.trim();
                const words = text.split(/\s+/);
                const result = words.map(word => {
                    return mapping[word] || word;
                }).join(' ');

                outputText.value = result;
            }

            // 前两个字母转换
            function convertFirstTwoLetters() {
                const mapping = parseCustomMapping();
                if (Object.keys(mapping).length === 0) {
                    alert('请先提取或设置双拼映射表');
                    return;
                }

                const text = inputText.value.trim();
                const lines = text.split('\n');
                const result = lines.map(line => {
                    if (line.length >= 2) {
                        const firstTwo = line.substring(0, 2);
                        const rest = line.substring(2);
                        return (mapping[firstTwo] || firstTwo) + rest;
                    }
                    return line;
                }).join('\n');

                outputText.value = result;
            }

            // 两个字母为一组转换
            function convertByPairs() {
                const mapping = parseCustomMapping();
                if (Object.keys(mapping).length === 0) {
                    alert('请先提取或设置双拼映射表');
                    return;
                }

                const text = inputText.value.trim();
                const lines = text.split('\n');
                const result = lines.map(line => {
                    let resultLine = '';
                    let i = 0;

                    while (i < line.length - 1) {
                        const pair = line.substring(i, i + 2);
                        if (mapping[pair]) {
                            resultLine += mapping[pair];
                            i += 2;
                        } else {
                            resultLine += line[i];
                            i++;
                        }
                    }

                    // 处理最后一个字符（如果有的话）
                    if (i < line.length) {
                        resultLine += line[i];
                    }

                    return resultLine;
                }).join('\n');

                outputText.value = result;
            }

            // 统计汉字数
            function countChineseCharacters() {
                const text = inputText.value.trim();
                const lines = text.split('\n');
                const result = lines.map(line => {
                    let count = 0;
                    for (let i = 0; i < line.length; i++) {
                        if (line.charCodeAt(i) > 127) {
                            count++;
                        }
                    }
                    return `${line} ${count}`;
                }).join('\n');

                outputText.value = result;
            }

            // 高级转换
            function advancedConvert() {
                const mapping = parseCustomMapping();
                const text = inputText.value.trim();
                const lines = text.split('\n');
                const result = lines.map(line => {
                    const parts = line.split('\t');

                    if (parts.length >= 3) {
                        const type = parts[2].trim();

                        // 处理不同类型的编码
                        if (/^(单辅|单辅尾先|三双辅|双辅|唯一|唯一五码|查形|单辅查形|纯音字|三码二字词|提醒)$/.test(type)) {
                            const code = parts[1].trim();
                            const firstTwo = code.substring(0, 2);

                            if (mapping[firstTwo]) {
                                parts[1] = mapping[firstTwo] + code.substring(2);
                            }
                        } else if (type === '三字词') {
                            const code = parts[1].trim();
                            let newCode = '';

                            for (let i = 0; i < code.length; i += 2) {
                                const pair = code.substring(i, i + 2);
                                newCode += mapping[pair] || pair;
                            }

                            parts[1] = newCode;
                        }
                    }

                    return parts.join('\t');
                }).join('\n');

                outputText.value = result;
            }

            // 删除空格
            function removeSpaces() {
                const text = outputText.value;
                const result = text.replace(/[^\S\n]/g, '');
                outputText.value = result;
            }

            // 导出为TXT
            function exportToTxt() {
                const text = outputText.value;
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');

                a.href = url;
                a.download = '汉心快打转换结果.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // 复制结果
            function copyResult() {
                outputText.select();
                document.execCommand('copy');
                alert('已复制到剪贴板');
            }

            // 重置
            function reset() {
                sourceScheme.value = 1;
                targetScheme.value = 2;
                customMapping.value = '';
                inputText.value = '';
                outputText.value = '';
                currentMapping = {};
            }

            // 绑定事件监听器
            extractSchemeBtn.addEventListener('click', extractSchemeMapping);
            resetBtn.addEventListener('click', reset);
            addSpaceBtn.addEventListener('click', addSpaceAfterSecondChar);
            convertBtn.addEventListener('click', convertBySpace);
            convertTwoLettersBtn.addEventListener('click', convertFirstTwoLetters);
            convertByPairsBtn.addEventListener('click', convertByPairs);
            countChineseBtn.addEventListener('click', countChineseCharacters);
            advancedBtn.addEventListener('click', advancedConvert);
            removeSpacesBtn.addEventListener('click', removeSpaces);
            exportBtn.addEventListener('click', exportToTxt);
            copyBtn.addEventListener('click', copyResult);
        });
    </script>
</body>
</html>

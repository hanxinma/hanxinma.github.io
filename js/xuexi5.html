<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙码音形拼音字根训练</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0e5ec 0%, #d0d5dc 100%);
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 2.5rem 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .nav-cards {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            margin: -2.5rem -2rem 1.5rem -2rem;
            padding: 1rem 2rem 0 2rem;
            background: #0097a1;
            border-radius: 20px 20px 0 0;
        }

        .nav-card {
            flex: 1;
            padding: 16px 8px 20px 8px;
            background: #00a8b0;
            border-radius: 15px 15px 0 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            margin: 0 1px;
        }

        .nav-card:hover {
            background: #00b5c2;
            color: white;
        }

        .nav-card.active {
            background: white;
            color: #0097a1;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.15);
            font-weight: 600;
            border-radius: 15px 15px 0 0;
            margin-bottom: -2px;
        }

        .nav-desc {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .voice-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #666;
        }

        .voice-toggle>div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .voice-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0097a1;
            margin: 0;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;

            border-radius: 50px;
            font-size: 2rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-inner {
            height: 100%;
            background: #0097a1;
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1.5rem;
        }

        .zigen-display {
            font-size: 3rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #1a1a1a;
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
        }

        .hint {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 2rem;
            height: 1.5rem;
            line-height: 1.5rem;
        }

        .first-hint {
            background: #fff8e1;
            color: #f57c00;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .error-hint {
            color: #d32f2f;
            font-size: 0.9rem;
            height: 1.5rem;
            line-height: 1.5rem;
            margin-top: 0.25rem;
            visibility: hidden;
        }

        input {
            padding: 4px 6px 2px 6px;
            /* 改小内边距 */
            font-size: 2rem;
            /* 改小字体 */
            max-width: 120px;
            /* 改窄最大宽度 */
            width: 100%;



            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            text-align: center;
            line-height: 1;
            border: 2px solid #999;
            border-radius: 10px;
            outline: none;
            text-transform: lowercase;
            transition: border-color 0.2s;
            caret-color: transparent;
            background: transparent;
            color: #999;
        }

        input:focus {
            border-color: #999;
        }

        input.input-error {
            border-color: #999;
            background: transparent;
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .stat-value.mastered {
            color: #0097a1;
        }

        .stat-value.wrong {
            color: #2b2b2b;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.25rem;
        }

        .reset-btn {
            background: none;
            border: none;
            color: #0097a1;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 8px 16px;
            margin-top: 1rem;
        }

        .reset-btn:hover {
            text-decoration: underline;
        }

        .zigen-display.error {
            color: #d32f2f;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-8px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .pop {
            animation: pop 0.2s ease-out;
        }

        /* 庆祝弹窗 */
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
        }

        .celebration.show {
            display: flex;
        }

        .celebration-content {
            background: white;
            padding: 2rem 3rem;
            border-radius: 16px;
            text-align: center;
        }

        .celebration-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .celebration-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .celebration-btn {
            background: #0097a1;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>

        <button class="reset-btn" id="reset-btn">重置</button>

        <div class="nav-desc">必学的要练熟，快的话3小时学会龙码，慢的话3天</div>

    </div>

            var currentDataIndex = 0;

            // 转换函数：将原始数据转为DATA格式
            function convertData(rawArr) {
                return rawArr.map(function (item) {
                    var parts = item.split('\t');
                    return {
                        name: parts[0] || '',       // 字根
                        key: parts[1] || '',        // 编码
                        rel: parts[2] || ''         // 汉字（相关字）
                    };
                });
            }

            // 字根数据
            var DATA = convertData(根队列0);

            // 算法参数
            var STEPS = [1, 2, 4, 8, 16, 32];
            var MASTERED_LEVEL = 6;
            var MASTERED_FLAG = 99;
            var STORAGE_KEY = 'zima_training_progress';

            // 获取当前队列的storage key
            function getStorageKey() {
                return STORAGE_KEY + '_' + currentDataIndex;
            }

            // 状态
            var records = [];
            var masteredCount = 0;
            var wrongCount = 0;
            var isShowingWrong = false;

            // 切换数据
            function switchData(index) {
                currentDataIndex = index;
                DATA = convertData(allData[index]);
                // 加载对应队列的进度
                if (!loadProgress()) {
                    initFresh();
                } else {
                    updateUI();
                }
            }

            // DOM 元素
            var inputEl, zigenBox, hintBox, errorAnswer, progressInner, progressText;
            var statMastered, statLearning, statWrong, celebrationEl, voiceToggle, hideZigenToggle;

            // 保存进度到 localStorage
            function saveProgress() {
                var data = {
                    records: records,
                    masteredCount: masteredCount,
                    wrongCount: wrongCount
                };
                try {
                    localStorage.setItem(getStorageKey(), JSON.stringify(data));
                } catch (e) {
                    console.log('保存进度失败', e);
                }
            }

            // 从 localStorage 加载进度
            function loadProgress() {
                try {
                    var saved = localStorage.getItem(getStorageKey());
                    if (saved) {
                        var data = JSON.parse(saved);
                        // 验证数据格式是否正确
                        if (Array.isArray(data.records) && data.records.length > 0) {
                            records = data.records;
                            masteredCount = data.masteredCount || 0;
                            wrongCount = data.wrongCount || 0;
                            return true;
                        }
                    }
                } catch (e) {
                    console.log('加载进度失败', e);
                }
                return false;
            }

                hideZigenToggle = document.getElementById('hide-zigen');

                // 绑定按钮事件
                document.getElementById('reset-btn').onclick = resetApp;
                document.getElementById('celebration-btn').onclick = closeCelebration;
            }

            // 语音朗读
            function speakText(text) {
                if (!voiceToggle || !voiceToggle.checked) return;
                if (!text) return;

                var utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            }

            // 初始化游戏（全新开始）
            function initFresh() {
                records = [];
                for (var i = 0; i < DATA.length; i++) {
                    records.push([-1, i]); // [level, index]
                }
                masteredCount = 0;
                wrongCount = 0;
                isShowingWrong = false;

                if (celebrationEl) {
                    celebrationEl.classList.remove('show');
                }

                saveProgress();
                updateUI();
            }

            // 更新界面
            function updateUI() {
                // 清理已牢记的
                while (records.length > 0 && records[0][0] === MASTERED_FLAG) {
                    records.shift();
                }

                if (records.length === 0) {
                    if (celebrationEl) {
                        celebrationEl.classList.add('show');
                    }
                    return;
                }

                var level = records[0][0];
                var dataIdx = records[0][1];
                var card = DATA[dataIdx];

                // 更新字根
                zigenBox.textContent = card.name;
                zigenBox.classList.remove('shake', 'error');

                // 隐藏/显示字根
                var isHidden = hideZigenToggle && hideZigenToggle.checked;
                if (isHidden) {
                    zigenBox.style.visibility = 'hidden';
                } else {
                    zigenBox.style.visibility = 'visible';
                    // 新学的字根(level=-1)用浅绿色
                    if (level === -1) {
                        zigenBox.style.color = '#0097a1';
                    } else {
                        zigenBox.style.color = '#1a1a1a';
                    }
                }

                // 更新提示
                if (level === -1) {
                    hintBox.innerHTML = '<div class="first-hint">学习请输入： <b>' + card.key + '</b></div>';
                    // 学习状态也朗读rel数据
                    if (card.rel) {
                        speakText(card.rel);
                    }
                } else if (card.rel) {
                    // 朗读相关内容（无论是否隐藏显示）
                    speakText(card.rel);
                    // 非学习状态下，如果开启了隐藏字根，则隐藏rel提示
                    if (isHidden) {
                        hintBox.innerHTML = '';
                    } else {
                        hintBox.innerHTML = '<div style="color:#999;">相关：' + card.rel + '</div>';
                    }
                } else {
                    hintBox.innerHTML = '<div style="color:#999;">忘记请按空格键</div>';
                }
                errorAnswer.style.visibility = 'hidden';

                // 更新进度
                var percent = Math.round((masteredCount / DATA.length) * 100);
                progressInner.style.width = percent + '%';
                progressText.textContent = percent + '% 已牢记';

                // 更新统计
                statMastered.textContent = masteredCount;
                statLearning.textContent = records.length;
                statWrong.textContent = wrongCount;

                // 重置输入框
                inputEl.value = '';
                inputEl.disabled = false;
                inputEl.className = '';
                inputEl.placeholder = '';
                inputEl.focus();
            }

            // 答对
            function handleCorrect() {
                if (records.length === 0) return;

                var currentRecord = records.shift();
                var newLevel = currentRecord[0] === -1 ? 0 : currentRecord[0] + 1;

                // 视觉反馈
                zigenBox.classList.add('pop');
                inputEl.classList.add('pop');

                if (newLevel >= MASTERED_LEVEL) {
                    currentRecord[0] = MASTERED_FLAG;
                    masteredCount++;
                    records.push(currentRecord);
                } else {
                    var jump = STEPS[newLevel] || 32;
                    var insertPos = Math.min(jump, records.length);
                    records.splice(insertPos, 0, currentRecord);
                    currentRecord[0] = newLevel;
                }

                // 保存进度
                saveProgress();
                setTimeout(updateUI, 150);
            }

            // 答错
            function handleWrong(showAnswer) {
                if (isShowingWrong) return;
                if (records.length === 0) return;

                isShowingWrong = true;
                wrongCount++;

                var level = records[0][0];
                var dataIdx = records[0][1];
                var card = DATA[dataIdx];

                // 字根抖动并变红
                zigenBox.style.animation = 'none';
                zigenBox.offsetHeight;
                zigenBox.style.animation = '';
                zigenBox.style.color = '#d32f2f'; // 用 inline 样式确保覆盖
                zigenBox.classList.add('shake', 'error');

                // 显示答案
                if (showAnswer !== false) {
                    errorAnswer.textContent = '正确答案：' + card.key;
                    errorAnswer.style.visibility = 'visible';
                }

                // 手机端：保持输入框可用，避免键盘收起
                inputEl.placeholder = '点击继续';
                inputEl.blur();
                setTimeout(function() {
                    inputEl.focus();
                }, 10);

                // 重置 level
                records[0][0] = 0;

                // 保存进度
                saveProgress();
            }

            // 继续
            function continueFromWrong() {
                if (!isShowingWrong) return;

                isShowingWrong = false;
                inputEl.classList.remove('input-error');
                inputEl.placeholder = '';
                inputEl.value = '';
                // 手机端：保持焦点，键盘不收起
                inputEl.focus();
            }

            // 庆祝
            function closeCelebration() {
                if (celebrationEl) {
                    celebrationEl.classList.remove('show');
                }
                records = [];
                for (var i = 0; i < DATA.length; i++) {
                    records.push([0, i]);
                }
                masteredCount = 0;
                wrongCount = 0;
                saveProgress();
                updateUI();
            }

            // 重置（清空进度）
            function resetApp() {
                if (confirm('确定要重置所有进度吗？')) {
                    initFresh();
                }
            }

            // 输入处理
            function onInput(e) {
                if (isShowingWrong) {
                    e.target.value = '';
                    continueFromWrong();
                    return;
                }
                if (records.length === 0) return;

                var currentRecord = records[0];
                var card = DATA[currentRecord[1]];
                var val = e.target.value.toLowerCase().trim();

                if (val.length < card.key.length) return;

                if (val === card.key) {
                    handleCorrect();
                } else {
                    handleWrong();
                }
            }

            // 键盘处理
            function onKeydown(e) {
                if (e.key === ' ' && !isShowingWrong) {
                    e.preventDefault();
                    handleWrong();
                } else if (isShowingWrong) {
                    continueFromWrong();
                }
            }

            // 启动
            function start() {
                initDOM();

                // 绑定导航点击事件
                var navCards = document.querySelectorAll('.nav-card');
                navCards.forEach(function (card, index) {
                    card.onclick = function () {
                        // 移除所有active
                        navCards.forEach(function (c) { c.classList.remove('active'); });
                        // 添加active到当前
                        card.classList.add('active');

                        // 根据索引切换数据
                        switchData(index);
                    };
                });

                // 尝试加载保存的进度，如果没有则重新开始
                if (!loadProgress()) {
                    initFresh();
                } else {
                    updateUI();
                }

                inputEl.oninput = onInput;
                inputEl.onkeydown = onKeydown;
                document.onkeydown = onKeydown;

                // 强制锁定输入框焦点
                function lockFocus() {
                    inputEl.focus();
                }
                // 页面加载后立即锁定
                setTimeout(lockFocus, 10);
                // 防止输入框失去焦点
                inputEl.onblur = function () {
                    setTimeout(lockFocus, 10);
                };
                // 点击页面任意位置时重新聚焦
                document.addEventListener('click', lockFocus);
                document.addEventListener('touchstart', lockFocus);
            }

            // 等 DOM 加载完
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', start);
            } else {
                start();
            }
        })();
    </script>

</body>

</html>

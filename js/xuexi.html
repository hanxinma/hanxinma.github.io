                    var rest = parts[1] || '';
                    // 提取编码（在"形码，"和","之间的部分）
                    var keyMatch = rest.match(/形码，([a-z]+)/i);
                    var key = keyMatch ? keyMatch[1] : '';
                    // 解释部分（逗号后面的所有内容）
                    var rel = rest.replace(/.*形码，[a-z]+,/, '').replace(/，/g, ',').trim();
                    return name + '\t' + key + '\t' + rel;
                });

                statLearning = document.getElementById('stat-learning');
                statWrong = document.getElementById('stat-wrong');
                celebrationEl = document.getElementById('celebration');
                voiceToggle = document.getElementById('voice-toggle');
                hideZigenToggle = document.getElementById('hide-zigen');

                // 手机端隐藏语音开关和隐藏字根开关
                var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                if (isMobile) {
                    if (voiceToggle) {
                        var voiceToggleDiv = voiceToggle.parentNode;
                        if (voiceToggleDiv) {
                            voiceToggleDiv.style.display = 'none';
                        }
                    }
                    if (hideZigenToggle) {
                        var hideZigenDiv = hideZigenToggle.parentNode;
                        if (hideZigenDiv) {
                            hideZigenDiv.style.display = 'none';
                        }
                    }
                }

                // 绑定按钮事件
                document.getElementById('reset-btn').onclick = resetApp;
                document.getElementById('celebration-btn').onclick = closeCelebration;
            }

            // 语音朗读
            function speakText(text) {
                if (!voiceToggle || !voiceToggle.checked) return;
                if (!text) return;

                var utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
            }

            // 初始化游戏（全新开始）
            function initFresh() {
                records = [];
                // 规则详解训练模式（index 4）和注意的字（index 5）直接进入复习模式（level=0），不显示学习提示
                var initialLevel = (currentDataIndex === 4 || currentDataIndex === 5) ? 0 : -1;
                for (var i = 0; i < DATA.length; i++) {
                    records.push([initialLevel, i]); // [level, index]
                }
                masteredCount = 0;
                wrongCount = 0;
                isShowingWrong = false;

                if (celebrationEl) {
                    celebrationEl.classList.remove('show');
                }

                saveProgress();
                updateUI();
            }

            // 更新界面
            function updateUI() {
                // 清理已牢记的
                while (records.length > 0 && records[0][0] === MASTERED_FLAG) {
                    records.shift();
                }

                if (records.length === 0) {
                    if (celebrationEl) {
                        celebrationEl.classList.add('show');
                    }
                    return;
                }

                var level = records[0][0];
                var dataIdx = records[0][1];
                var card = DATA[dataIdx];

                // 更新字根
                zigenBox.textContent = card.name;
                zigenBox.classList.remove('shake', 'error');

                // 隐藏/显示字根
                var isHidden = hideZigenToggle && hideZigenToggle.checked;
                if (isHidden) {
                    zigenBox.style.visibility = 'hidden';
                } else {
                    zigenBox.style.visibility = 'visible';
                    // 新学的字根(level=-1)用浅绿色
                    if (level === -1) {
                        zigenBox.style.color = '#0097a1';
                    } else {
                        zigenBox.style.color = '#1a1a1a';
                    }
                }

                // 更新提示
                if (level === -1) {
                    hintBox.innerHTML = '<div class="first-hint">学习请输入： <b>' + card.key + '</b></div>';
                    // 学习状态也朗读rel数据
                    if (card.rel) {
                        speakText(card.rel);
                    }
                } else if (card.rel) {
                    // 朗读相关内容（无论是否隐藏显示）
                    speakText(card.rel);
                    // 非学习状态下，如果开启了隐藏字根，则隐藏rel提示
                    if (isHidden) {
                        hintBox.innerHTML = '';
                    } else {
                        hintBox.innerHTML = '<div style="color:#999;">相关：' + card.rel + '</div>';
                    }
                } else {
                    hintBox.innerHTML = '<div style="color:#999;">忘记请按空格键</div>';
                }
                errorAnswer.style.visibility = 'hidden';

                // 更新进度
                var percent = Math.round((masteredCount / DATA.length) * 100);
                progressInner.style.width = percent + '%';
                progressText.textContent = percent + '% 已牢记';

                // 更新统计
                statMastered.textContent = masteredCount;
                statLearning.textContent = records.length;
                statWrong.textContent = wrongCount;

                // 重置输入框
                inputEl.value = '';
                inputEl.disabled = false;
                inputEl.className = '';
                inputEl.placeholder = '';
                inputEl.focus();
            }

            // 答对
            function handleCorrect() {
                if (records.length === 0) return;

                var currentRecord = records.shift();

                // 视觉反馈
                zigenBox.classList.add('pop');
                inputEl.classList.add('pop');

                // 规则详解训练模式（index 4）和注意的字（index 5）：直接下一题，不间隔重复
                if (currentDataIndex === 4 || currentDataIndex === 5) {
                    masteredCount++;
                    // 直接丢弃已答对的题目，不重新插入队列
                } else {
                    // 正常训练模式：使用间隔重复算法
                    var newLevel = currentRecord[0] === -1 ? 0 : currentRecord[0] + 1;

                    if (newLevel >= MASTERED_LEVEL) {
                        currentRecord[0] = MASTERED_FLAG;
                        masteredCount++;
                        records.push(currentRecord);
                    } else {
                        var jump = STEPS[newLevel] || 32;
                        var insertPos = Math.min(jump, records.length);
                        records.splice(insertPos, 0, currentRecord);
                        currentRecord[0] = newLevel;
                    }
                }

                // 保存进度
                saveProgress();
                setTimeout(updateUI, 150);
            }

            // 答错
            function handleWrong(showAnswer) {
                if (isShowingWrong) return;
                if (records.length === 0) return;

                isShowingWrong = true;
                wrongCount++;

                var level = records[0][0];
                var dataIdx = records[0][1];
                var card = DATA[dataIdx];

                // 字根抖动并变红
                zigenBox.style.animation = 'none';
                zigenBox.offsetHeight;
                zigenBox.style.animation = '';
                zigenBox.style.color = '#d32f2f'; // 用 inline 样式确保覆盖
                zigenBox.classList.add('shake', 'error');

                // 显示答案
                if (showAnswer !== false) {
                    errorAnswer.textContent = '正确答案：' + card.key;
                    errorAnswer.style.visibility = 'visible';
                }

                // 禁用输入（使用标志位避免手机键盘收起）
                isInputBlocked = true;
                inputEl.placeholder = '输入';

                // 重置 level
                records[0][0] = 0;

                // 保存进度
                saveProgress();
            }

            // 继续
            function continueFromWrong() {
                if (!isShowingWrong) return;

                isShowingWrong = false;
                isInputBlocked = false;
                inputEl.classList.remove('input-error');
                inputEl.placeholder = '';
                inputEl.value = '';
                inputEl.focus();
            }

            // 庆祝
            function closeCelebration() {
                if (celebrationEl) {
                    celebrationEl.classList.remove('show');
                }
                records = [];
                for (var i = 0; i < DATA.length; i++) {
                    records.push([0, i]);
                }
                masteredCount = 0;
                wrongCount = 0;
                saveProgress();
                updateUI();
            }

            // 重置（清空进度）
            function resetApp() {
                if (confirm('确定要重置所有进度吗？')) {
                    initFresh();
                }
            }

            // 输入处理
            function onInput(e) {
                if (isShowingWrong) return;
                if (isInputBlocked) return;
                if (records.length === 0) return;

                // 检测空格键（手机软键盘输入的空格字符）
                if (e.target.value.indexOf(' ') !== -1) {
                    e.target.value = e.target.value.replace(/\s/g, '');
                    handleWrong();
                    return;
                }

                var currentRecord = records[0];
                var card = DATA[currentRecord[1]];
                var val = e.target.value.toLowerCase().trim();

                if (val.length < card.key.length) return;

                if (val === card.key) {
                    handleCorrect();
                } else {
                    handleWrong();
                }
            }

            // 键盘处理
            function onKeydown(e) {
                if (e.key === ' ' && !isShowingWrong) {
                    e.preventDefault();
                    handleWrong();
                } else if (isShowingWrong) {
                    continueFromWrong();
                }
            }

            // 启动
            function start() {
                initDOM();

                // 下拉菜单切换（支持多个下拉菜单）
                window.toggleDropdown = function (dropdownId) {
                    // 关闭所有其他下拉菜单
                    document.querySelectorAll('.nav-dropdown').forEach(function (d) {
                        if (d.querySelector('.nav-dropdown-content').id !== dropdownId) {
                            d.classList.remove('open');
                        }
                    });
                    // 切换当前下拉菜单
                    var dropdown = document.getElementById(dropdownId).parentElement;
                    dropdown.classList.toggle('open');
                };

                // 导航选择
                window.selectNav = function (index) {
                    // 关闭所有下拉菜单
                    document.querySelectorAll('.nav-dropdown').forEach(function (d) {
                        d.classList.remove('open');
                    });

                    // 获取当前选择的项目
                    var items = document.querySelectorAll('.nav-dropdown-item[data-index]');
                    var selectedItem = null;
                    for (var i = 0; i < items.length; i++) {
                        if (parseInt(items[i].getAttribute('data-index')) === index) {
                            selectedItem = items[i];
                            break;
                        }
                    }

                    if (selectedItem) {
                        // 更新按钮显示的文字
                        var btn = selectedItem.closest('.nav-dropdown').querySelector('.nav-dropdown-btn span:first-child');
                        if (btn && !btn.classList.contains('nav-arrow')) {
                            btn.textContent = selectedItem.textContent;
                        }

                        // 更新active状态
                        items.forEach(function (item) {
                            item.classList.remove('active');
                        });
                        selectedItem.classList.add('active');

                        // 高亮当前导航
                        document.querySelectorAll('.nav-dropdown').forEach(function (d) {
                            d.classList.remove('active');
                        });
                        selectedItem.closest('.nav-dropdown').classList.add('active');

                        // 切换数据
                        switchData(index);
                    }
                };

                // 外部链接跳转
                window.selectExternalLink = function (url) {
                    window.open(url, '_blank');
                };

                // 点击其他地方关闭下拉菜单
                document.addEventListener('click', function (e) {
                    if (!e.target.closest('.nav-dropdown')) {
                        document.querySelectorAll('.nav-dropdown').forEach(function (d) {
                            d.classList.remove('open');
                        });
                    }
                });

                // 尝试加载保存的进度，如果没有则重新开始
                if (!loadProgress()) {
                    initFresh();
                } else {
                    updateUI();
                }

                inputEl.oninput = onInput;
                inputEl.onkeydown = onKeydown;
                document.onkeydown = onKeydown;

                // 强制锁定输入框焦点
                function lockFocus() {
                    inputEl.focus();
                }
                // 页面加载后立即锁定
                setTimeout(lockFocus, 10);
                // 防止输入框失去焦点
                inputEl.onblur = function () {
                    setTimeout(lockFocus, 10);
                };
                // 点击页面任意位置时重新聚焦
                document.addEventListener('click', lockFocus);
                document.addEventListener('touchstart', lockFocus);
            }

            // 等 DOM 加载完
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', start);
            } else {
                start();
            }
        })();
    </script>
